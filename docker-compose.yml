services:
  mysql-legacy:
    image: mysql:8.0
    container_name: legacy-db-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${LEGACY_DB:-legacy_db}
      MYSQL_USER: ${DB_USER:-dbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "${LEGACY_DB_PORT:-3307}:3306"
    volumes:
      - legacy_db_data:/var/lib/mysql
      - ./docker/init-scripts/legacy:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-new:
    image: mysql:8.0
    container_name: new-db-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${NEW_DB:-new_db}
      MYSQL_USER: ${DB_USER:-dbuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "${NEW_DB_PORT:-3308}:3306"
    volumes:
      - new_db_data:/var/lib/mysql
      - ./docker/init-scripts/new:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql-legacy
      - mysql-new

volumes:
  legacy_db_data:
    driver: local
  new_db_data:
    driver: local
